<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>500 — Veterm</title>
<style>
  :root {
    --bg: #1c1a18;
    --bg-card: #252220;
    --text-primary: #d6cfc3;
    --text-secondary: #a0988a;
    --text-muted: #6e6860;
    --accent: #c0392b;
    --border: #3a3530;
    --font-mono: "Sarasa Mono SC", "LXGW WenKai Mono", "JetBrains Mono", "Consolas", monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-mono);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-weight: 300;
    line-height: 1.6;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 48px 44px;
    max-width: 520px;
    width: 100%;
    margin: 24px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 4px;
    height: 100%;
    background: var(--accent);
    opacity: 0.6;
  }
  .code { font-size: 4rem; font-weight: 300; color: var(--accent); margin-bottom: 8px; }
  h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 12px; color: var(--text-primary); }
  p { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 24px; }
  .hint { font-size: 0.72rem; color: var(--text-muted); border-top: 1px solid var(--border); padding-top: 16px; }
  a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent); }
  a:hover { border-bottom: 2px solid var(--accent); }
</style>
</head>
<body>
<div class="card">
  <div class="code">500</div>
  <h1>Internal Server Error</h1>
  <p>Something went wrong on the server. The error has been logged and will be investigated. Please try again shortly.</p>
  <div class="hint">
    <a href="/">← Return to homepage</a> &nbsp;·&nbsp; Try refreshing the page
  </div>
</div>
</body>
</html>
